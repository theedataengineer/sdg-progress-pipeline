version: 2

sources:
  - name: raw
    description: Raw tables loaded from World Bank API and Kafka streaming
    schema: public
    tables:
      - name: raw_wb_sdg_indicators
        description: World Bank SDG indicators batch loaded weekly
        columns:
          - name: indicator_code
            tests: [not_null]
          - name: country_code
            tests: [not_null]
          - name: year
            tests: [not_null]

      - name: raw_kafka_sdg_stream
        description: Streaming SDG records from Kafka consumer
        columns:
          - name: record_id
            tests: [not_null, unique]

      - name: raw_sdg_goal_metadata
        description: SDG goal reference data — 17 goals
        columns:
          - name: goal
            tests: [not_null, unique]

      - name: raw_wb_country_metadata
        description: Country metadata with region and income group
        columns:
          - name: country_code
            tests: [not_null, unique]
