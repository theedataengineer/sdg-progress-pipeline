x-airflow-common: &airflow-common
  image: apache/airflow:2.8.0
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://sdg_user:sdg_password_2024@postgres:5432/sdg_warehouse
    AIRFLOW__CORE__FERNET_KEY: ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./ingestion:/opt/airflow/ingestion
    - ./kafka:/opt/airflow/kafka
    - ./.env:/opt/airflow/.env
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - sdg-network

services:

  # ─────────────────────────────────────────
  # ZOOKEEPER — Kafka cluster coordinator
  # Manages Kafka broker metadata and leader
  # election. Required by Kafka to function.
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: sdg-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - sdg-network
    healthcheck:
      test: echo srvr | nc localhost 2181 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # KAFKA — Streaming message broker
  # Receives SDG indicator updates from the
  # producer and delivers them to consumers.
  # Topics act like named data streams.
  # ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: sdg-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_LOG_RETENTION_HOURS: 168
    networks:
      - sdg-network
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1
      interval: 15s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────
  # KAFKA UI — Browser interface for Kafka
  # See topics, messages, consumer groups
  # and producer activity in real time.
  # Visit: http://localhost:8090
  # ─────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: sdg-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: sdg-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - sdg-network

  # ─────────────────────────────────────────
  # MINIO — Local S3-compatible data lake
  # Stores raw JSON batches from the Kafka
  # consumer before they load to PostgreSQL.
  # API:  http://localhost:9000
  # UI:   http://localhost:9001
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: sdg-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    networks:
      - sdg-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # MINIO SETUP — One-time bucket creation
  # Runs once after MinIO starts, creates
  # the sdg-progress-pipeline bucket, then
  # exits. Uses the MinIO client (mc) CLI.
  # ─────────────────────────────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: sdg-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123;
      mc mb --ignore-existing local/sdg-progress-pipeline;
      mc mb --ignore-existing local/sdg-progress-pipeline/raw/world-bank;
      mc mb --ignore-existing local/sdg-progress-pipeline/raw/undesa;
      mc mb --ignore-existing local/sdg-progress-pipeline/streaming/kafka-batches;
      mc mb --ignore-existing local/sdg-progress-pipeline/streaming/failed-records;
      mc mb --ignore-existing local/sdg-progress-pipeline/processed;
      echo 'MinIO buckets created successfully';
      "
    networks:
      - sdg-network

  # ─────────────────────────────────────────
  # POSTGRESQL — Data warehouse
  # Stores raw tables loaded from MinIO and
  # the final dbt-transformed analytics
  # models that Superset reads from.
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: sdg-postgres
    environment:
      POSTGRES_DB: sdg_warehouse
      POSTGRES_USER: sdg_user
      POSTGRES_PASSWORD: sdg_password_2024
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sdg-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdg_user -d sdg_warehouse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # AIRFLOW INIT — One-time setup
  # Creates the airflow database schema and
  # the default admin user on first run.
  # Exits after setup is complete.
  # ─────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: sdg-airflow-init
    command: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname SDG --lastname Pipeline --role Admin --email admin@sdg-pipeline.com"
    networks:
      - sdg-network

  # ─────────────────────────────────────────
  # AIRFLOW WEBSERVER — DAG management UI
  # Where you trigger DAGs, monitor runs,
  # view logs and check task status.
  # Visit: http://localhost:8080
  # Login: admin / admin
  # ─────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: sdg-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - sdg-network
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────
  # AIRFLOW SCHEDULER — DAG trigger engine
  # Continuously checks DAG schedules and
  # triggers task execution. Runs silently
  # in the background — no UI.
  # ─────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: sdg-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - sdg-network

  # ─────────────────────────────────────────
  # APACHE SUPERSET — Dashboard & viz layer
  # Connects to PostgreSQL dbt mart tables
  # and renders the SDG progress dashboard.
  # Visit: http://localhost:8088
  # Login: admin / admin
  # ─────────────────────────────────────────
  superset:
    image: apache/superset:3.1.0
    container_name: sdg-superset
    environment:
      SUPERSET_SECRET_KEY: sdg_superset_secret_2024
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://sdg_user:sdg_password_2024@postgres:5432/sdg_warehouse
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
    command: bash -c "superset db upgrade && superset fab create-admin --username admin --firstname SDG --lastname Admin --email admin@sdg.com --password admin && superset init && superset run -p 8088 --with-threads --reload --debugger"
    networks:
      - sdg-network

# ─────────────────────────────────────────
# NAMED VOLUMES — Persistent data storage
# Data survives container restarts.
# postgres_data keeps your warehouse data.
# minio_data keeps your raw lake files.
# ─────────────────────────────────────────
volumes:
  postgres_data:
  minio_data:

# ─────────────────────────────────────────
# NETWORK — All services talk to each other
# using service names as hostnames.
# e.g. kafka:9092, postgres:5432
# ─────────────────────────────────────────
networks:
  sdg-network:
    driver: bridge
